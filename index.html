<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Brovon Technology — DTC &amp; Brand E-Commerce Capabilities</title>
<script src="https://cdn.jsdelivr.net/npm/react@18/umd/react.production.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@babel/standalone/babel.min.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=Montserrat:wght@700;800&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet" />
<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

  /* === BROVON TECHNOLOGY BRAND TOKENS === */
  :root {
    --ink:        #1E3D63;   /* navy — headings, structural */
    --ink-soft:   #44546A;   /* body text */
    --paper:      #F6F7F9;
    --paper-2:    #EBEEF3;
    --deep:       #132A45;   /* dark navy panels */
    --accent:     #E2402C;   /* logo red-orange */
    --accent-soft:#FBE3DE;
    --amber:      #F2A03D;   /* logo dots / RESPONSE orange */
    --amber-soft: #FCEBD2;
    --good:       #1E7A46;
    --good-soft:  #DEEEE2;
    --good-deep:  #14532D;
    --slate:      #5A6B7E;
    --muted:      #8A97A5;
  }

  html { font-size: 16px; }
  body {
    font-family: 'Inter', system-ui, sans-serif;
    background: var(--paper);
    color: var(--ink);
    overflow: hidden;
    height: 100dvh;
    width: 100vw;
    -webkit-font-smoothing: antialiased;
  }
  #root { height: 100%; width: 100%; }

  .grain {
    position: fixed; inset: 0; z-index: 0; pointer-events: none; opacity: 0.05;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
    background-size: 256px 256px;
  }

  @keyframes fadeUp { from { opacity: 0; transform: translateY(28px); } to { opacity: 1; transform: translateY(0); } }
  @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
  @keyframes scaleIn { from { opacity: 0; transform: scale(0.92); } to { opacity: 1; transform: scale(1); } }
  @keyframes blinkCursor { 0%, 49% { opacity: 1; } 50%, 100% { opacity: 0; } }
  .a-up    { animation: fadeUp  0.7s cubic-bezier(0.22, 1, 0.36, 1) both; }
  .a-in    { animation: fadeIn  0.8s ease both; }
  .a-scale { animation: scaleIn 0.6s cubic-bezier(0.22, 1, 0.36, 1) both; }
  .d1{animation-delay:.10s} .d2{animation-delay:.20s} .d3{animation-delay:.32s}
  .d4{animation-delay:.45s} .d5{animation-delay:.58s} .d6{animation-delay:.72s}
  .d7{animation-delay:.86s} .d8{animation-delay:1.00s} .d9{animation-delay:1.15s}

  .slide { position: absolute; inset: 0; padding: 52px 72px 92px; overflow-y: auto; }
  .slide-inner { max-width: 1240px; width: 100%; margin: 0 auto; }
  @media (max-width: 900px) { .slide { padding: 36px 24px 88px; } }
  @media (max-height: 720px) { .slide { padding-top: 38px; padding-bottom: 80px; } }

  h1.display, h2.display, h3.display {
    font-weight: 800;
    letter-spacing: -0.015em;
    line-height: 1.05;
    color: var(--ink);
  }
  h1.display { font-size: clamp(2.4rem, 4.8vw, 4rem); }
  h2.display { font-size: clamp(1.8rem, 3.4vw, 2.7rem); }
  h3.display { font-size: clamp(1.15rem, 1.6vw, 1.4rem); }

  .lede  { font-size: clamp(0.98rem, 1.25vw, 1.14rem); line-height: 1.6; color: var(--ink-soft); max-width: 820px; }
  .small { font-size: 0.82rem; color: var(--slate); }

  .eyebrow {
    display: inline-flex; align-items: center; gap: 10px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.72rem; font-weight: 500;
    letter-spacing: 0.22em; text-transform: uppercase;
    color: var(--accent); margin-bottom: 16px;
  }
  .eyebrow::before { content:''; width: 26px; height: 2px; background: var(--accent); }
  .eyebrow.ink { color: var(--ink); } .eyebrow.ink::before { background: var(--ink); }
  .eyebrow.amber { color: var(--amber); } .eyebrow.amber::before { background: var(--amber); }

  .quote {
    border-left: 4px solid var(--accent);
    padding: 6px 0 6px 22px;
    font-size: clamp(1.15rem, 1.9vw, 1.6rem); line-height: 1.35;
    font-weight: 700; color: var(--ink);
    max-width: 860px;
  }

  .card {
    background: #fff; border: 1px solid rgba(30,61,99,0.10);
    border-radius: 14px; padding: 24px;
    transition: all 0.3s ease;
  }
  .card:hover { border-color: var(--ink); transform: translateY(-3px); box-shadow: 0 14px 40px -10px rgba(19,42,69,0.16); }

  .pill {
    display: inline-flex; align-items: center; gap: 6px;
    padding: 4px 12px; border-radius: 99px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.68rem; font-weight: 500;
    letter-spacing: 0.08em; text-transform: uppercase;
  }
  .pill.green { background: var(--good-soft); color: var(--good-deep); }
  .pill.coral { background: var(--accent-soft); color: var(--accent); }
  .pill.gold  { background: var(--amber-soft); color: #8A5A13; }
  .pill.ink   { background: rgba(30,61,99,0.09); color: var(--ink); }
  .pill.line  { background: transparent; color: var(--ink); border: 1px solid rgba(30,61,99,0.4); }
  .pill .dot-i { width: 7px; height: 7px; border-radius: 50%; background: currentColor; }

  .stat { border-left: 3px solid var(--accent); padding: 4px 0 4px 16px; }
  .stat-num { font-weight: 800; letter-spacing: -0.02em; font-size: clamp(1.9rem, 3.2vw, 2.8rem); line-height: 1; color: var(--ink); }
  .stat-label { font-size: 0.8rem; color: var(--slate); margin-top: 6px; line-height: 1.45; }

  .cap-card { background:#fff; border:1px solid rgba(30,61,99,0.10); border-radius:12px;
              padding:20px 22px; display:flex; gap:14px; transition:all 0.3s ease; }
  .cap-card:hover { border-color:var(--ink); transform:translateY(-2px); box-shadow: 0 12px 32px -12px rgba(19,42,69,0.18); }
  .cap-num { width:32px; height:32px; border-radius:8px; display:grid; place-items:center;
             background:var(--ink); color:#fff;
             font-family:'JetBrains Mono',monospace; font-size:0.78rem; font-weight:600;
             flex-shrink:0; }
  .cap-title { font-weight: 700; font-size: 1rem; margin-bottom: 4px; color: var(--ink); }
  .cap-note { font-size: 0.87rem; color: var(--ink-soft); line-height: 1.55; }

  .channel { background:#fff; border:1px solid rgba(30,61,99,0.10);
             border-radius:14px; padding:22px 24px;
             display:flex; flex-direction:column; gap:10px;
             transition:all 0.3s ease; position:relative; overflow:hidden; }
  .channel::before { content:''; position:absolute; top:0; left:0; right:0; height:4px; background:var(--accent); }
  .channel.c-green::before { background:var(--good); }
  .channel.c-ink::before   { background:var(--ink); }
  .channel.c-amber::before { background:var(--amber); }
  .channel:hover { border-color:var(--ink); transform:translateY(-4px);
                   box-shadow:0 18px 50px -12px rgba(19,42,69,0.16); }
  .channel-head { font-weight: 800; font-size:1.25rem; letter-spacing:-0.01em; color: var(--ink); }

  .fly { background:#fff; border:1px solid rgba(30,61,99,0.10);
         border-radius:14px; padding:26px; min-height:300px;
         display:flex; flex-direction:column;
         transition:all 0.3s ease; position:relative; overflow:hidden; }
  .fly::before { content:''; position:absolute; top:0; left:0; right:0; height:4px; background:var(--accent); }
  .fly.c-green::before { background:var(--good); }
  .fly.c-ink::before   { background:var(--ink); }
  .fly.c-amber::before { background:var(--amber); }
  .fly:hover { border-color:var(--ink); transform:translateY(-4px);
               box-shadow:0 18px 50px -12px rgba(19,42,69,0.16); }
  .fly ul { list-style:none; margin-top:16px; display:flex; flex-direction:column; gap:12px; }
  .fly li { position:relative; padding-left:20px; font-size:0.9rem; line-height:1.55; color:var(--ink-soft); }
  .fly li::before { content:''; position:absolute; left:0; top:9px; width:10px; height:3px;
                    border-radius:2px; background:var(--accent); }

  .media-tile { height: 240px; border-radius: 12px; overflow: hidden; flex: 0 0 auto;
                border: 1px solid rgba(30,61,99,0.14);
                box-shadow: 0 14px 36px -16px rgba(19,42,69,0.35); background: #000; }

  .repo-shell { background:#fff; border:1px solid rgba(30,61,99,0.14);
                border-radius:14px; overflow:hidden;
                box-shadow: 0 24px 60px -24px rgba(19,42,69,0.3); }
  .repo-head { display:flex; align-items:center; gap:10px; padding:12px 18px;
               background:var(--deep); color:#EAF0F7;
               font-family:'JetBrains Mono',monospace; font-size:0.8rem; }
  .repo-bar { display:flex; gap:6px; margin-right:10px; }
  .repo-dot { width:10px; height:10px; border-radius:50%; }
  .agent-row { display:flex; align-items:center; gap:14px; padding:14px 18px;
               border-bottom:1px solid rgba(30,61,99,0.07); background:#fff; transition:background 0.2s ease; }
  .agent-row:last-child { border-bottom:none; }
  .agent-row:hover { background:var(--paper-2); }
  .agent-name { font-family:'JetBrains Mono',monospace; font-size:0.85rem; font-weight:600; color:var(--ink); }
  .agent-desc { font-size:0.78rem; color:var(--slate); margin-top:2px; }
  .cursor-line { font-family:'JetBrains Mono',monospace; font-size:0.8rem; color:var(--slate);
                 padding:12px 18px; background:#fff; border-top:1px dashed rgba(30,61,99,0.12); }
  .cursor-line .blink { display:inline-block; width:8px; height:14px; background:var(--accent);
                        vertical-align:middle; margin-left:6px; animation: blinkCursor 1.1s infinite; }

  .step { display:flex; gap:14px; align-items:flex-start; }
  .step-num { width:34px; height:34px; border-radius:50%; flex-shrink:0;
              display:grid; place-items:center; font-family:'JetBrains Mono',monospace;
              font-size:0.78rem; font-weight:600; background:var(--accent); color:#fff; }
  .step-title { font-weight:700; font-size:0.98rem; color:var(--ink); }
  .step-body { font-size:0.86rem; color:var(--ink-soft); line-height:1.5; margin-top:2px; }

  .mosaic-img { width:100%; height:100%; object-fit:cover; border-radius:10px; display:block; }

  .topbar {
    position: fixed; top: 0; left: 0; right: 0; z-index: 30;
    display: flex; align-items: center; justify-content: space-between;
    padding: 16px 28px; pointer-events: none;
  }
  .topbar > * { pointer-events: auto; }
  .top-meta { font-family: 'JetBrains Mono', monospace; font-size: 0.72rem; color: var(--slate); letter-spacing: 0.12em; text-transform: uppercase; }

  .progress { position: fixed; top: 0; left: 0; height: 3px; background: var(--accent); z-index: 40; transition: width 0.4s cubic-bezier(0.22, 1, 0.36, 1); }

  .navbar {
    position: fixed; bottom: 0; left: 0; right: 0; z-index: 30;
    display: flex; align-items: center; justify-content: space-between;
    padding: 14px 28px;
    background: linear-gradient(180deg, transparent, rgba(246,247,249,0.95) 35%);
    backdrop-filter: blur(6px);
  }
  .nav-left, .nav-right { display: flex; align-items: center; gap: 14px; }
  .nav-btn {
    width: 38px; height: 38px; border-radius: 50%;
    background: var(--ink); color: #fff;
    border: none; cursor: pointer;
    display: grid; place-items: center; font-size: 1rem;
    transition: all 0.2s ease;
  }
  .nav-btn:hover:not(:disabled) { background: var(--accent); transform: translateY(-1px); }
  .nav-btn:disabled { opacity: 0.25; cursor: not-allowed; }
  .nav-counter { font-family: 'JetBrains Mono', monospace; font-size: 0.78rem; font-weight: 500; letter-spacing: 0.1em; }
  .nav-dots { display: flex; gap: 6px; align-items: center; }
  .dot {
    width: 7px; height: 7px; border-radius: 50%;
    background: rgba(30,61,99,0.18); border: none; cursor: pointer; padding: 0;
    transition: all 0.25s ease;
  }
  .dot:hover { background: rgba(30,61,99,0.45); transform: scale(1.2); }
  .dot.active { background: var(--accent); width: 22px; border-radius: 4px; }
  .help-key {
    font-family: 'JetBrains Mono', monospace;
    background: var(--ink); color: #fff;
    padding: 2px 8px; border-radius: 4px;
    font-size: 0.72rem; margin: 0 4px;
  }
</style>
</head>

const SLIDE_VIEWS = {
  cover:   SlideCover,
  build:   SlideBuild,
  grow:    SlideGrow,

};

/* ─────────────────────────── APP SHELL ─────────────────────────── */

function App() {
  const total = SLIDES.length;
  const [idx, setIdx] = useState(() => {
    const h = parseInt((window.location.hash || "#1").slice(1), 10);
    return Number.isFinite(h) && h >= 1 && h <= total ? h - 1 : 0;
  });

  useEffect(() => {
    window.location.hash = String(idx + 1);
    document.title = `Brovon Technology — DTC & Brand E-Commerce Capabilities — ${SLIDES[idx].title}`;
  }, [idx]);

  useEffect(() => {
    const onKey = (e) => {
      if (e.key === "ArrowRight" || e.key === "PageDown" || e.key === " ") {
        e.preventDefault(); setIdx(i => Math.min(total - 1, i + 1));
      }
      if (e.key === "ArrowLeft" || e.key === "PageUp") {
        e.preventDefault(); setIdx(i => Math.max(0, i - 1));
      }
      if (e.key === "Home") setIdx(0);
      if (e.key === "End") setIdx(total - 1);
    };
    const onHash = () => {
      const h = parseInt((window.location.hash || "#1").slice(1), 10);
      if (Number.isFinite(h) && h >= 1 && h <= total) setIdx(h - 1);
    };
    window.addEventListener("keydown", onKey);
    window.addEventListener("hashchange", onHash);
    return () => {
      window.removeEventListener("keydown", onKey);
      window.removeEventListener("hashchange", onHash);
    };
  }, [total]);

  const touchX = useRef(null);
  const onTouchStart = (e) => { touchX.current = e.touches[0].clientX; };
  const onTouchEnd   = (e) => {
    if (touchX.current == null) return;
    const dx = e.changedTouches[0].clientX - touchX.current;
    if (Math.abs(dx) > 50) {
      setIdx(i => dx < 0 ? Math.min(total - 1, i + 1) : Math.max(0, i - 1));
    }
    touchX.current = null;
  };

  const Current = SLIDE_VIEWS[SLIDES[idx].id];
  return (
    <>
      <div className="progress" style={{ width: `${((idx + 1) / total) * 100}%` }} />
      <div className="topbar">
        <Wordmark height={22} />
        <div className="top-meta">{SLIDES[idx].title}</div>
      </div>
      <div className="slide" key={idx} onTouchStart={onTouchStart} onTouchEnd={onTouchEnd}>
        <Current />
      </div>
      <div className="navbar">
        <div className="nav-left">
          <button className="nav-btn"
            onClick={() => setIdx(i => Math.max(0, i - 1))}
            disabled={idx === 0}
            aria-label="Previous slide">←</button>
          <div className="nav-counter">{String(idx + 1).padStart(2, "0")} / {String(total).padStart(2, "0")}</div>
        </div>
        <div className="nav-dots">
          {SLIDES.map((_, i) => (
            <button key={i}
              className={`dot ${i === idx ? "active" : ""}`}
              onClick={() => setIdx(i)}
              aria-label={`Go to slide ${i + 1}`}/>
          ))}
        </div>
        <div className="nav-right">
          <div className="small" style={{ fontFamily: "JetBrains Mono, monospace", fontSize: "0.7rem" }}>
            <span className="help-key">←</span><span className="help-key">→</span> navigate
          </div>
          <button className="nav-btn"
            onClick={() => setIdx(i => Math.min(total - 1, i + 1))}
            disabled={idx === total - 1}
            aria-label="Next slide">→</button>
        </div>
      </div>
    </>
  );
}
